<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q-GPT Web</title>

<style>
body {background:#0f172a;color:white;font-family:sans-serif;padding:20px;}
.container {max-width:800px;margin:auto;}
textarea {width:100%;height:140px;padding:10px;border-radius:10px;border:none;}
button {padding:12px;margin-top:10px;width:100%;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;}
.btn-main {background:#3b82f6;}
.btn-sub {background:#64748b;}
.result {margin-top:20px;background:#1e293b;padding:15px;border-radius:10px;white-space:pre-wrap;}
</style>
</head>

<body>

<div class="container">
<h2>🔥 Q-GPT Web</h2>

<textarea id="prompt" placeholder="พิมพ์คำถาม เช่น ขายอะไรดี"></textarea>

<button class="btn-sub" onclick="setKey()">🔑 ใส่ API Key</button>
<button class="btn-main" onclick="runAI()">🧠 วิเคราะห์</button>

<div class="result" id="result">คำตอบจะขึ้นตรงนี้</div>
</div>

<script>

let API_KEY = "";

// โหลด key จากเครื่อง (ถ้ามี)
window.onload = () => {
  API_KEY = localStorage.getItem("api_key") || "";
};

// 🔑 ใส่ key
function setKey() {
  const key = prompt("ใส่ API Key ของคุณ");
  if (key) {
    localStorage.setItem("api_key", key);
    API_KEY = key;
    alert("บันทึกเรียบร้อย");
  }
}

// 🔥 ยิง AI
async function runAI() {
  const text = document.getElementById("prompt").value;
  const result = document.getElementById("result");

  if (!API_KEY) {
    alert("กรุณาใส่ API Key ก่อน");
    return;
  }

  if (!text) {
    result.innerText = "กรุณาพิมพ์ข้อความก่อน";
    return;
  }

  result.innerText = "กำลังคิด...";

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [
          { role: "user", content: text }
        ]
      })
    });

    const data = await res.json();

    result.innerText =
      data.choices?.[0]?.message?.content || "ไม่มีคำตอบ";

  } catch (err) {
    result.innerText = "Error: " + err.message;
  }
}

</script>

</body>
</html>
