<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q-System</title>

<style>
body {
  background: #0b0b0f;
  color: white;
  font-family: sans-serif;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 0 20px rgba(255,255,255,0.05);
}

.title {
  font-size: 26px;
  font-weight: bold;
}

textarea {
  width: 100%;
  height: 120px;
  border-radius: 15px;
  padding: 15px;
  background: #000;
  color: white;
  border: 1px solid #333;
}

button {
  padding: 12px 20px;
  border-radius: 15px;
  border: none;
  margin: 5px;
  cursor: pointer;
}

.run {
  background: linear-gradient(45deg, #ff4fd8, #ff00aa);
  color: white;
}

.clear {
  background: #222;
  color: white;
}

.output {
  margin-top: 20px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="card">
  <div class="title">🧠 Q-System Interface</div>
  <p>ทดลองใช้ระบบ</p>

  <textarea id="input" placeholder="พิมพ์ความคิด / ปัญหาของคุณ..."></textarea>

  <br>
  <button class="run" onclick="runQ()">Run Q-System</button>
  <button class="clear" onclick="clearText()">Clear</button>
</div>

<div class="card output" id="output">
ผลลัพธ์จะขึ้นตรงนี้...
</div>

<script>
const API_KEY = "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";

async function runQ() {
  const input = document.getElementById("input").value;

  document.getElementById("output").innerText = "⏳ กำลังคิด...";

  try {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json",
        "HTTP-Referer": "https://kiwchauat44-cmd.github.io/",
        "X-Title": "Q-System"
      },
      body: JSON.stringify({
        model: "openai/gpt-3.5-turbo",
        messages: [
          { role: "user", content: input }
        ]
      })
    });

    const data = await res.json();

    if (data.error) {
      document.getElementById("output").innerText = "❌ " + data.error.message;
      return;
    }

    document.getElementById("output").innerText =
      data.choices[0].message.content;

  } catch (err) {
    document.getElementById("output").innerText = "❌ Error: " + err.message;
  }
}

function clearText() {
  document.getElementById("input").value = "";
  document.getElementById("output").innerText = "";
}
</script>

</body>
</html>
