<textarea id="input" placeholder="Describe your idea..."></textarea>
<br><br>
<button onclick="run()">Run Synlayer</button>

<pre id="output"></pre>

<script>
function run() {
  let input = document.getElementById("input").value;
  
  let result = "Structured Output:\n\n";
  result += "- Core idea: " + input + "\n";
  result += "- Workflow: [analyze -> structure -> deploy]\n";
  result += "- Suggestion: refine and test\n";

  document.getElementById("output").innerText = result;
}
</script>
